    unit: endpoint-hour
    aggregation: sum
principles:
  - name: Visibility
    description: Track Databricks consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.

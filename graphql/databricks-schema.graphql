# Databricks Conceptual GraphQL Schema
# Derived from: https://docs.databricks.com/api/workspace/introduction
# Note: Databricks exposes a REST API only. This schema is a conceptual
# representation for tooling, federation, and gateway integration.

# ────────────────────────────────────────────────────────────────
# Scalars
# ────────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Long

# ────────────────────────────────────────────────────────────────
# Enums
# ────────────────────────────────────────────────────────────────

enum ClusterState {
  PENDING
  RUNNING
  RESTARTING
  RESIZING
  TERMINATING
  TERMINATED
  ERROR
  UNKNOWN
}

enum RunState {
  PENDING
  RUNNING
  SKIPPED
  INTERNAL_ERROR
  SUCCESS
  FAILED
  TIMEDOUT
  CANCELED
  WAITING_FOR_RETRY
  BLOCKED
  QUEUED
}

enum TableType {
  MANAGED
  EXTERNAL
  VIEW
  MATERIALIZED_VIEW
  STREAMING_TABLE
  FOREIGN
}

enum DataType {
  BOOLEAN
  BYTE
  SHORT
  INT
  LONG
  FLOAT
  DOUBLE
  DATE
  TIMESTAMP
  TIMESTAMP_NTZ
  STRING
  BINARY
  DECIMAL
  INTERVAL
  ARRAY
  STRUCT
  MAP
  CHAR
  NULL
  USER_DEFINED_TYPE
  TABLE_TYPE
}

enum PipelineState {
  DEPLOYING
  STARTING
  RUNNING
  STOPPING
  DELETED
  RECOVERING
  FAILED
  RESETTING
  IDLE
}

enum ModelVersionStatus {
  PENDING_REGISTRATION
  FAILED_REGISTRATION
  READY
}

enum ServingEndpointState {
  NOT_UPDATING
  UPDATE_QUEUED
  UPDATING_TRAFFIC
  UPDATING_INGRESS_CONFIG
  INTERNAL_ERROR
}

enum WarehouseState {
  STARTING
  RUNNING
  STOPPING
  STOPPED
  DELETING
  DELETED
}

enum RuntimeEngine {
  NULL
  STANDARD
  PHOTON
}

enum PermissionLevel {
  CAN_USE
  CAN_MANAGE
  CAN_RESTART
  CAN_ATTACH_TO
  CAN_RUN
  CAN_VIEW
  CAN_READ
  CAN_EDIT
  CAN_EDIT_METADATA
  CAN_MANAGE_STAGING_VERSIONS
  CAN_MANAGE_PRODUCTION_VERSIONS
  IS_OWNER
}

enum SecretScopeBackend {
  DATABRICKS
  AZURE_KEYVAULT
}

enum TaskType {
  NOTEBOOK_TASK
  SPARK_JAR_TASK
  SPARK_PYTHON_TASK
  SPARK_SUBMIT_TASK
  PIPELINE_TASK
  PYTHON_WHEEL_TASK
  SQL_TASK
  DBT_TASK
  RUN_JOB_TASK
  CONDITION_TASK
  FOR_EACH_TASK
}


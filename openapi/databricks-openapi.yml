openapi: 3.1.0
info:
  title: Databricks REST API
  description: >-
    The Databricks REST API provides programmatic access to manage Databricks
    workspace resources including clusters, jobs, and workspace objects. All API
    endpoints require authentication using a personal access token or OAuth token
    passed via the Authorization header. The base URL is specific to your
    Databricks workspace deployment region.
  version: 2.1.0
  contact:
    name: Databricks
    url: https://www.databricks.com/company/contact
    email: support@databricks.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  termsOfService: https://www.databricks.com/legal/terms-of-use
servers:
  - url: https://{workspace_host}/api
    description: Databricks workspace API endpoint
    variables:
      workspace_host:
        default: adb-1234567890123456.7.azuredatabricks.net
        description: >-
          The hostname of your Databricks workspace. Format varies by cloud
          provider (e.g., adb-<workspace-id>.<random>.azuredatabricks.net for
          Azure, <workspace-id>.cloud.databricks.com for AWS).
security:
  - bearerAuth: []
tags:
  - name: Clusters
    description: >-
      Manage Databricks clusters for running data engineering and data science
      workloads on Apache Spark.
  - name: Jobs
    description: >-
      Create and manage automated workloads including notebooks, JARs, Python
      scripts, and multi-task workflows.
  - name: Workspace
    description: >-
      Manage workspace objects such as notebooks, folders, and libraries.
paths:
  /2.0/clusters/create:
    post:
      operationId: createCluster
      summary: Databricks Create a new cluster
      description: >-
        Creates a new Spark cluster. This method acquires new instances from the
        cloud provider and starts the Spark driver and worker processes. The
        cluster is created asynchronously; use the cluster_id returned to poll
        for status.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClusterRequest'
      responses:
        '200':
          description: Cluster creation initiated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cluster_id:
                    type: string
                    description: The unique identifier of the newly created cluster.
                    examples:
                      - '1234-567890-abcde123'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/list:
    get:
      operationId: listClusters
      summary: Databricks List all clusters
      description: >-
        Returns information about all clusters in the workspace, including
        terminated clusters. Clusters are ordered by cluster_id.
      tags:
        - Clusters
      parameters:
        - name: can_use_client
          in: query
          required: false
          description: Filter clusters by client compatibility.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved the list of clusters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClusterDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/get:
    get:
      operationId: getCluster
      summary: Databricks Get cluster details
      description: >-
        Retrieves detailed information about a cluster, including its current
        state, configuration, and runtime properties.
      tags:
        - Clusters
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: The unique identifier of the cluster.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved cluster details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDetails'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/start:
    post:
      operationId: startCluster
      summary: Databricks Start a terminated cluster
      description: >-
        Starts a terminated cluster given its cluster_id. This is similar to
        creating a cluster except it uses the configuration of the previously
        terminated cluster.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
              properties:
                cluster_id:
                  type: string
                  description: The cluster to start.
      responses:
        '200':
          description: Cluster start initiated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/restart:
    post:
      operationId: restartCluster
      summary: Databricks Restart a cluster
      description: >-
        Restarts a Spark cluster given its cluster_id. If the cluster is not in
        a RUNNING state, nothing happens.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
              properties:
                cluster_id:
                  type: string
                  description: The cluster to restart.
      responses:
        '200':
          description: Cluster restart initiated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/delete:
    post:
      operationId: terminateCluster
      summary: Databricks Terminate a cluster
      description: >-
        Terminates a Spark cluster given its cluster_id. The cluster is removed
        after being terminated. Use the permanent-delete endpoint if you want to
        remove the cluster configuration entirely.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
              properties:
                cluster_id:
                  type: string
                  description: The cluster to terminate.
      responses:
        '200':
          description: Cluster termination initiated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/permanent-delete:
    post:
      operationId: permanentDeleteCluster
      summary: Databricks Permanently delete a cluster
      description: >-
        Permanently deletes a Spark cluster. If the cluster is running, it is
        terminated and resources are asynchronously removed. If the cluster is
        terminated, it is immediately removed. A cluster can only be permanently
        deleted by an admin or the cluster creator.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
              properties:
                cluster_id:
                  type: string
                  description: The cluster to permanently delete.
      responses:
        '200':
          description: Cluster permanently deleted.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/edit:
    post:
      operationId: editCluster
      summary: Databricks Edit cluster configuration
      description: >-
        Edits the configuration of a cluster to match the provided attributes.
        The cluster must be in a RUNNING or TERMINATED state. If the cluster is
        running, it will be restarted to apply the changes.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditClusterRequest'
      responses:
        '200':
          description: Cluster configuration updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/clusters/events:
    post:
      operationId: listClusterEvents
      summary: Databricks List cluster events
      description: >-
        Retrieves a list of events about the activity of a cluster. Events are
        returned in reverse chronological order. This endpoint can be used to
        audit cluster activity and monitor lifecycle changes.
      tags:
        - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cluster_id
              properties:
                cluster_id:
                  type: string
                  description: The ID of the cluster to retrieve events for.
                start_time:
                  type: integer
                  format: int64
                  description: Start timestamp in milliseconds for the event query range.
                end_time:
                  type: integer
                  format: int64
                  description: End timestamp in milliseconds for the event query range.
                order:
                  type: string
                  enum:
                    - DESC
                    - ASC
                  description: Sort order for results.
                event_types:
                  type: array
                  items:
                    type: string
                    enum:
                      - CREATING
                      - DID_NOT_EXPAND_DISK
                      - EXPANDED_DISK
                      - FAILED_TO_EXPAND_DISK
                      - INIT_SCRIPTS_STARTING
                      - INIT_SCRIPTS_FINISHED
                      - STARTING
                      - RESTARTING
                      - TERMINATING
                      - EDITED
                      - RUNNING
                      - RESIZING
                      - UPSIZE_COMPLETED
                      - NODES_LOST
                      - DRIVER_HEALTHY
                      - DRIVER_NOT_RESPONDING
                      - DRIVER_UNAVAILABLE
                      - SPARK_EXCEPTION
                      - PINNED
                      - UNPINNED
                  description: Filter by specific event types.
                offset:
                  type: integer
                  format: int64
                  description: Offset for pagination.
                limit:
                  type: integer
                  format: int64
                  description: Maximum number of events to return (max 500).
      responses:
        '200':
          description: Successfully retrieved cluster events.
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClusterEvent'
                  next_page:
                    type: object
                    properties:
                      cluster_id:
                        type: string
                      end_time:
                        type: integer
                        format: int64
                      offset:
                        type: integer
                        format: int64
                  total_count:
                    type: integer
                    format: int64
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/create:
    post:
      operationId: createJob
      summary: Databricks Create a new job
      description: >-
        Creates a new job with the provided settings. The job can be configured
        with a single task or multiple tasks with dependencies forming a
        directed acyclic graph (DAG).
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '200':
          description: Job created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: integer
                    format: int64
                    description: The canonical identifier for the newly created job.
                    examples:
                      - 11223344
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/list:
    get:
      operationId: listJobs
      summary: Databricks List all jobs
      description: >-
        Retrieves a list of jobs in the workspace. Results are paginated and can
        be filtered by name.
      tags:
        - Jobs
      parameters:
        - name: limit
          in: query
          required: false
          description: >-
            The number of jobs to return. This value must be greater than 0 and
            less than or equal to 25. The default value is 20.
          schema:
            type: integer
            default: 20
            maximum: 25
        - name: offset
          in: query
          required: false
          description: The offset of the first job to return.
          schema:
            type: integer
            default: 0
        - name: name
          in: query
          required: false
          description: >-
            A filter on the list based on the exact (case-insensitive) job name.
          schema:
            type: string
        - name: expand_tasks
          in: query
          required: false
          description: Whether to include task and cluster details in the response.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successfully retrieved the list of jobs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Job'
                  has_more:
                    type: boolean
                    description: Whether there are more jobs to list.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/get:
    get:
      operationId: getJob
      summary: Databricks Get a job
      description: >-
        Retrieves the details of a single job, including its settings, creator,
        and run history summary.
      tags:
        - Jobs
      parameters:
        - name: job_id
          in: query
          required: true
          description: The canonical identifier of the job to retrieve.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved the job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/update:
    post:
      operationId: updateJob
      summary: Databricks Partially update a job
      description: >-
        Add, update, or remove specific settings of an existing job. Use
        reset to overwrite all settings.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
              properties:
                job_id:
                  type: integer
                  format: int64
                  description: The canonical identifier of the job to update.
                new_settings:
                  $ref: '#/components/schemas/JobSettings'
                fields_to_remove:
                  type: array
                  items:
                    type: string
                  description: >-
                    A list of fields to remove from the job settings.
      responses:
        '200':
          description: Job updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/delete:
    post:
      operationId: deleteJob
      summary: Databricks Delete a job
      description: >-
        Deletes a job and all its associated runs. The job is permanently removed
        and cannot be recovered.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
              properties:
                job_id:
                  type: integer
                  format: int64
                  description: The canonical identifier of the job to delete.
      responses:
        '200':
          description: Job deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/run-now:
    post:
      operationId: runJobNow
      summary: Databricks Trigger a job run
      description: >-
        Triggers an immediate run of a job. One run is triggered for each call.
        Runs triggered by run-now are considered triggered runs. Parameters can
        be passed to override the job defaults.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - job_id
              properties:
                job_id:
                  type: integer
                  format: int64
                  description: The canonical identifier of the job to run.
                idempotency_token:
                  type: string
                  description: >-
                    An optional token to guarantee the idempotency of job run
                    requests. Reusing the token with a different run will cause
                    the request to fail.
                jar_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for JAR tasks.
                notebook_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of key-value pairs for notebook parameters.
                python_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for Python tasks.
                spark_submit_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for Spark submit tasks.
                python_named_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of named parameters for Python tasks.
                pipeline_params:
                  type: object
                  properties:
                    full_refresh:
                      type: boolean
                      description: Whether to run a full refresh of the pipeline.
                  description: Parameters for pipeline tasks.
                sql_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of named parameters for SQL tasks.
      responses:
        '200':
          description: Job run triggered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: integer
                    format: int64
                    description: The globally unique ID of the newly triggered run.
                  number_in_job:
                    type: integer
                    format: int64
                    description: >-
                      A unique identifier for this run within the job. This is
                      an auto-incrementing value.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/runs/list:
    get:
      operationId: listJobRuns
      summary: Databricks List job runs
      description: >-
        Lists runs from most recently started to least. Results are paginated.
        Runs can be filtered by job, active state, and completion status.
      tags:
        - Jobs
      parameters:
        - name: job_id
          in: query
          required: false
          description: The job for which to list runs. If omitted, lists runs for all jobs.
          schema:
            type: integer
            format: int64
        - name: active_only
          in: query
          required: false
          description: >-
            If true, only active runs are included in the results; otherwise
            lists both active and completed runs.
          schema:
            type: boolean
            default: false
        - name: completed_only
          in: query
          required: false
          description: If true, only completed runs are included in the results.
          schema:
            type: boolean
            default: false
        - name: offset
          in: query
          required: false
          description: The offset of the first run to return.
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          description: The number of runs to return (max 25).
          schema:
            type: integer
            default: 25
            maximum: 25
        - name: run_type
          in: query
          required: false
          description: The type of runs to return.
          schema:
            type: string
            enum:
              - JOB_RUN
              - WORKFLOW_RUN
              - SUBMIT_RUN
        - name: expand_tasks
          in: query
          required: false
          description: Whether to include task details in each run.
          schema:
            type: boolean
            default: false
        - name: start_time_from
          in: query
          required: false
          description: Filter runs started after this time (epoch milliseconds).
          schema:
            type: integer
            format: int64
        - name: start_time_to
          in: query
          required: false
          description: Filter runs started before this time (epoch milliseconds).
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved the list of runs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Run'
                  has_more:
                    type: boolean
                    description: Whether there are more runs to list.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/runs/get:
    get:
      operationId: getJobRun
      summary: Databricks Get a job run
      description: >-
        Retrieves the metadata of a run, including start time, end time,
        status, and task details.
      tags:
        - Jobs
      parameters:
        - name: run_id
          in: query
          required: true
          description: The canonical identifier of the run.
          schema:
            type: integer
            format: int64
        - name: include_history
          in: query
          required: false
          description: Whether to include the repair history in the response.
          schema:
            type: boolean
        - name: include_resolved_values
          in: query
          required: false
          description: Whether to include resolved parameter values in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: Successfully retrieved run details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/runs/cancel:
    post:
      operationId: cancelJobRun
      summary: Databricks Cancel a job run
      description: >-
        Cancels an active run. The run is canceled asynchronously, and the
        request returns immediately. The canceled run transitions to a
        TERMINATING state.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - run_id
              properties:
                run_id:
                  type: integer
                  format: int64
                  description: The canonical identifier of the run to cancel.
      responses:
        '200':
          description: Run cancellation initiated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.1/jobs/runs/get-output:
    get:
      operationId: getJobRunOutput
      summary: Databricks Get run output
      description: >-
        Retrieves the output and metadata of a single task run. This endpoint
        can be used for notebook, JAR, Python, and Spark submit task outputs.
      tags:
        - Jobs
      parameters:
        - name: run_id
          in: query
          required: true
          description: The canonical identifier of the run.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved run output.
          content:
            application/json:
              schema:
                type: object
                properties:
                  notebook_output:
                    type: object
                    properties:
                      result:
                        type: string
                        description: The value passed to dbutils.notebook.exit().
                      truncated:
                        type: boolean
                  error:
                    type: string
                    description: Error message if the run failed.
                  error_trace:
                    type: string
                    description: Stack trace of the error.
                  metadata:
                    $ref: '#/components/schemas/Run'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/list:
    get:
      operationId: listWorkspaceObjects
      summary: Databricks List workspace objects
      description: >-
        Lists the contents of a directory in the workspace, or the object if it
        is not a directory. If the input path does not exist, a
        RESOURCE_DOES_NOT_EXIST error is returned.
      tags:
        - Workspace
      parameters:
        - name: path
          in: query
          required: true
          description: >-
            The absolute path of the workspace directory to list. Must start
            with /.
          schema:
            type: string
        - name: notebooks_modified_after
          in: query
          required: false
          description: >-
            If provided, only notebooks modified after this timestamp (epoch
            seconds) are returned.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully listed workspace objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  objects:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/get-status:
    get:
      operationId: getWorkspaceObjectStatus
      summary: Databricks Get workspace object status
      description: >-
        Gets the status of an object or a directory in the workspace. If the
        object does not exist, a RESOURCE_DOES_NOT_EXIST error is returned.
      tags:
        - Workspace
      parameters:
        - name: path
          in: query
          required: true
          description: The absolute path of the workspace object. Must start with /.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved object status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/export:
    get:
      operationId: exportWorkspaceObject
      summary: Databricks Export a workspace object
      description: >-
        Exports a notebook or the contents of an entire directory. Notebooks
        can be exported in SOURCE, HTML, JUPYTER, or DBC format.
      tags:
        - Workspace
      parameters:
        - name: path
          in: query
          required: true
          description: >-
            The absolute path of the object or directory to export. Must start
            with /.
          schema:
            type: string
        - name: format
          in: query
          required: false
          description: >-
            The format in which to export the notebook. The default is SOURCE.
          schema:
            type: string
            enum:
              - SOURCE
              - HTML
              - JUPYTER
              - DBC
              - R_MARKDOWN
            default: SOURCE
        - name: direct_download
          in: query
          required: false
          description: >-
            Whether to download the file directly. If true, the response is the
            exported content.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successfully exported the workspace object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                    description: >-
                      The base64-encoded content of the exported object.
                  file_type:
                    type: string
                    description: The type of the exported file.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/import:
    post:
      operationId: importWorkspaceObject
      summary: Databricks Import a workspace object
      description: >-
        Imports a notebook or the contents of an entire directory. If the object
        already exists and overwrite is set to false, a
        RESOURCE_ALREADY_EXISTS error is returned.
      tags:
        - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                  description: >-
                    The absolute path of the object to import. Must start with /.
                format:
                  type: string
                  enum:
                    - SOURCE
                    - HTML
                    - JUPYTER
                    - DBC
                    - R_MARKDOWN
                    - AUTO
                  description: >-
                    The format of the content. AUTO will try to detect the format
                    automatically.
                language:
                  type: string
                  enum:
                    - SCALA
                    - PYTHON
                    - SQL
                    - R
                  description: >-
                    The language of the object. Required for SOURCE format when
                    the object type is a notebook.
                content:
                  type: string
                  description: >-
                    The base64-encoded content to import. Limit is 10 MB.
                overwrite:
                  type: boolean
                  description: >-
                    If true, the existing object is overwritten. Default is false.
                  default: false
      responses:
        '200':
          description: Object imported successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/delete:
    post:
      operationId: deleteWorkspaceObject
      summary: Databricks Delete a workspace object
      description: >-
        Deletes an object or a directory and optionally all of its contents. If
        the path does not exist, a RESOURCE_DOES_NOT_EXIST error is returned.
        If path is a non-empty directory and recursive is false, a
        DIRECTORY_NOT_EMPTY error is returned.
      tags:
        - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                  description: >-
                    The absolute path of the object to delete. Must start with /.
                recursive:
                  type: boolean
                  description: >-
                    If true, all contents of the directory are recursively deleted.
                    Required for non-empty directories.
                  default: false
      responses:
        '200':
          description: Object deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /2.0/workspace/mkdirs:
    post:
      operationId: createWorkspaceDirectory
      summary: Databricks Create a directory
      description: >-
        Creates the given directory and necessary parent directories if they
        do not exist. If there is an object (not a directory) at any prefix
        of the input path, a RESOURCE_ALREADY_EXISTS error is returned.
      tags:
        - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - path
              properties:
                path:
                  type: string
                  description: >-
                    The absolute path of the directory to create. Must start
                    with /.
      responses:
        '200':
          description: Directory created successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PAT
      description: >-
        Databricks personal access token (PAT) or OAuth M2M token. Pass the
        token in the Authorization header as 'Bearer <token>'.
  schemas:
    CreateClusterRequest:
      type: object
      required:
        - cluster_name
        - spark_version
        - node_type_id
      properties:
        cluster_name:
          type: string
          description: >-
            A human-readable name for the cluster. This does not need to be
            unique.
          examples:
            - my-data-cluster
        spark_version:
          type: string
          description: >-
            The runtime version of the cluster. You can retrieve a list of
            available runtime versions using the Runtime Versions API.
          examples:
            - 14.3.x-scala2.12
        node_type_id:
          type: string
          description: >-
            The node type for worker nodes. This field determines the cloud
            provider instance type.
          examples:
            - i3.xlarge
        driver_node_type_id:
          type: string
          description: >-
            The node type for the Spark driver. If not specified, defaults
            to the same value as node_type_id.
        num_workers:
          type: integer
          description: >-
            Number of worker nodes for a fixed-size cluster. A cluster has
            one Spark driver and num_workers executors. Set to 0 for a
            single-node cluster.
          examples:
            - 2
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        spark_conf:
          type: object
          additionalProperties:
            type: string
          description: >-
            A map of Spark configuration key-value pairs. These override the
            default Spark configuration values.
        aws_attributes:
          $ref: '#/components/schemas/AwsAttributes'
        azure_attributes:
          $ref: '#/components/schemas/AzureAttributes'
        gcp_attributes:
          $ref: '#/components/schemas/GcpAttributes'
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: >-
            Additional tags for cluster resources. Tags are propagated to the
            cloud provider for cost tracking.
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
          description: >-
            Environment variables for all Spark processes. Use
            {{secrets/scope/key}} to reference secrets.
        autotermination_minutes:
          type: integer
          description: >-
            Minutes of inactivity after which the cluster is automatically
            terminated. 0 disables auto-termination.
          default: 120
        enable_elastic_disk:
          type: boolean
          description: >-
            Whether to autoscale local storage. When enabled, Databricks
            monitors disk usage and attaches additional disks as needed.
        instance_pool_id:
          type: string
          description: >-
            The optional ID of the instance pool to use for cluster nodes.
        policy_id:
          type: string
          description: >-
            The ID of the cluster policy to apply. Cluster policies constrain
            the configuration settings.
        enable_local_disk_encryption:
          type: boolean
          description: Whether to encrypt data on local disks.
        runtime_engine:
          type: string
          enum:
            - STANDARD
            - PHOTON
          description: >-
            The runtime engine. PHOTON enables the Photon vectorized query
            engine for faster performance.
        data_security_mode:
          type: string
          enum:
            - NONE
            - SINGLE_USER
            - USER_ISOLATION
            - LEGACY_TABLE_ACL
            - LEGACY_PASSTHROUGH
            - LEGACY_SINGLE_USER
            - LEGACY_SINGLE_USER_STANDARD
          description: Data security mode for the cluster.
        single_user_name:
          type: string
          description: >-
            The user name (email) of the single user for SINGLE_USER access mode.
        init_scripts:
          type: array
          items:
            $ref: '#/components/schemas/InitScriptInfo'
          description: Init scripts to run when the cluster starts.
        ssh_public_keys:
          type: array
          items:
            type: string
          description: SSH public keys to add to each Spark node.
    EditClusterRequest:
      type: object
      required:
        - cluster_id
        - cluster_name
        - spark_version
        - node_type_id
      properties:
        cluster_id:
          type: string
          description: The unique identifier of the cluster to edit.
        cluster_name:
          type: string
          description: The new name for the cluster.
        spark_version:
          type: string
          description: The runtime version.
        node_type_id:
          type: string
          description: The node type for worker nodes.
        driver_node_type_id:
          type: string
          description: The node type for the Spark driver.
        num_workers:
          type: integer
          description: Number of worker nodes.
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        spark_conf:
          type: object
          additionalProperties:
            type: string
        custom_tags:
          type: object
          additionalProperties:
            type: string
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
        autotermination_minutes:
          type: integer
        enable_elastic_disk:
          type: boolean
        instance_pool_id:
          type: string
        policy_id:
          type: string
        data_security_mode:
          type: string
          enum:
            - NONE
            - SINGLE_USER
            - USER_ISOLATION
            - LEGACY_TABLE_ACL
            - LEGACY_PASSTHROUGH
            - LEGACY_SINGLE_USER
            - LEGACY_SINGLE_USER_STANDARD
        single_user_name:
          type: string
        runtime_engine:
          type: string
          enum:
            - STANDARD
            - PHOTON
    ClusterDetails:
      type: object
      properties:
        cluster_id:
          type: string
          description: The unique identifier of the cluster.
        cluster_name:
          type: string
          description: The human-readable name of the cluster.
        spark_version:
          type: string
          description: The runtime version of the cluster.
        node_type_id:
          type: string
          description: The node type for worker nodes.
        driver_node_type_id:
          type: string
          description: The node type for the Spark driver.
        num_workers:
          type: integer
          description: Number of worker nodes.
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        state:
          type: string
          enum:
            - PENDING
            - RUNNING
            - RESTARTING
            - RESIZING
            - TERMINATING
            - TERMINATED
            - ERROR
            - UNKNOWN
          description: The current state of the cluster.
        state_message:
          type: string
          description: A message about the state of the cluster.
        start_time:
          type: integer
          format: int64
          description: The time the cluster was started in epoch milliseconds.
        terminated_time:
          type: integer
          format: int64
          description: The time the cluster was terminated in epoch milliseconds.
        last_state_loss_time:
          type: integer
          format: int64
          description: >-
            The time when the cluster driver last lost its state in epoch
            milliseconds.
        last_activity_time:
          type: integer
          format: int64
          description: The time of the last user activity on the cluster.
        last_restarted_time:
          type: integer
          format: int64
          description: The time the cluster was last restarted.
        creator_user_name:
          type: string
          description: The email of the user who created the cluster.
        cluster_source:
          type: string
          enum:
            - UI
            - API
            - JOB
            - MODELS
            - PIPELINE
            - PIPELINE_MAINTENANCE
            - SQL
            - SOME_OTHER_SOURCE
          description: The source that created the cluster.
        spark_conf:
          type: object
          additionalProperties:
            type: string
          description: Spark configuration key-value pairs.
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: Tags applied to the cluster.
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
        autotermination_minutes:
          type: integer
          description: Auto-termination idle timeout in minutes.
        enable_elastic_disk:
          type: boolean
        instance_pool_id:
          type: string
        policy_id:
          type: string
        data_security_mode:
          type: string
        single_user_name:
          type: string
        runtime_engine:
          type: string
        default_tags:
          type: object
          additionalProperties:
            type: string
          description: Default tags applied by Databricks.
        cluster_log_status:
          type: object
          properties:
            last_attempted:
              type: integer
              format: int64
            last_exception:
              type: string
        termination_reason:
          type: object
          properties:
            code:
              type: string
              description: Status code for the termination reason.
            type:
              type: string
              description: Termination type.
            parameters:
              type: object
              additionalProperties:
                type: string
        disk_spec:
          type: object
          properties:
            disk_count:
              type: integer
            disk_size:
              type: integer
            disk_type:
              type: object
              properties:
                azure_disk_volume_type:
                  type: string
                ebs_volume_type:
                  type: string
        driver:
          $ref: '#/components/schemas/SparkNode'
        executors:
          type: array
          items:
            $ref: '#/components/schemas/SparkNode'
        jdbc_port:
          type: integer
          description: Port on the driver for JDBC/ODBC connections.
        spark_context_id:
          type: integer
          format: int64
          description: The canonical Spark context identifier.
    SparkNode:
      type: object
      properties:
        private_ip:
          type: string
        public_dns:
          type: string
        node_id:
          type: string
        instance_id:
          type: string
        start_timestamp:
          type: integer
          format: int64
        host_private_ip:
          type: string
    AutoScale:
      type: object
      properties:
        min_workers:
          type: integer
          description: The minimum number of workers the cluster can scale down to.
        max_workers:
          type: integer
          description: The maximum number of workers the cluster can scale up to.
      description: >-
        Autoscaling configuration. When set, num_workers is ignored and the
        cluster scales between min_workers and max_workers.
    AwsAttributes:
      type: object
      properties:
        first_on_demand:
          type: integer
          description: Number of on-demand instances to place first.
        availability:
          type: string
          enum:
            - SPOT
            - ON_DEMAND
            - SPOT_WITH_FALLBACK
        zone_id:
          type: string
          description: The availability zone identifier (e.g., us-west-2a).
        instance_profile_arn:
          type: string
          description: IAM instance profile ARN for the cluster instances.
        spot_bid_price_percent:
          type: integer
          description: Max bid price as percentage of on-demand price.
        ebs_volume_type:
          type: string
          enum:
            - GENERAL_PURPOSE_SSD
            - THROUGHPUT_OPTIMIZED_HDD
        ebs_volume_count:
          type: integer
        ebs_volume_size:
          type: integer
    AzureAttributes:
      type: object
      properties:
        first_on_demand:
          type: integer
        availability:
          type: string
          enum:
            - SPOT_AZURE
            - ON_DEMAND_AZURE
            - SPOT_WITH_FALLBACK_AZURE
        spot_bid_max_price:
          type: number
    GcpAttributes:
      type: object
      properties:
        use_preemptible_executors:
          type: boolean
        google_service_account:
          type: string
        availability:
          type: string
          enum:
            - GCP_PREEMPTIBLE
            - GCP_ON_DEMAND
    InitScriptInfo:
      type: object
      properties:
        workspace:
          type: object
          properties:
            destination:
              type: string
        volumes:
          type: object
          properties:
            destination:
              type: string
        dbfs:
          type: object
          properties:
            destination:
              type: string
          deprecated: true
    ClusterEvent:
      type: object
      properties:
        cluster_id:
          type: string
        timestamp:
          type: integer
          format: int64
        type:
          type: string
        details:
          type: object
          properties:
            current_num_workers:
              type: integer
            target_num_workers:
              type: integer
            previous_attributes:
              type: object
            attributes:
              type: object
            previous_cluster_size:
              type: object
            cluster_size:
              type: object
            cause:
              type: string
            reason:
              type: object
              properties:
                code:
                  type: string
                type:
                  type: string
                parameters:
                  type: object
                  additionalProperties:
                    type: string
    CreateJobRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the job.
          examples:
            - my-etl-job
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSettings'
          description: >-
            A list of task specifications to be executed by this job. For
            single-task jobs, use the top-level task fields instead.
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
          description: >-
            A list of job cluster specifications that can be shared and
            reused by tasks in this job.
        email_notifications:
          $ref: '#/components/schemas/JobEmailNotifications'
        webhook_notifications:
          $ref: '#/components/schemas/WebhookNotifications'
        notification_settings:
          type: object
          properties:
            no_alert_for_skipped_runs:
              type: boolean
            no_alert_for_canceled_runs:
              type: boolean
        timeout_seconds:
          type: integer
          description: >-
            Maximum allowed duration for the job. If exceeded, the job is
            set to a TIMED_OUT life cycle state. 0 means no timeout.
          default: 0
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        continuous:
          type: object
          properties:
            pause_status:
              type: string
              enum:
                - PAUSED
                - UNPAUSED
          description: Continuous job settings for streaming workloads.
        trigger:
          type: object
          properties:
            pause_status:
              type: string
              enum:
                - PAUSED
                - UNPAUSED
            file_arrival:
              type: object
              properties:
                url:
                  type: string
                min_time_between_triggers_seconds:
                  type: integer
                wait_after_last_change_seconds:
                  type: integer
          description: Trigger settings for file arrival-based jobs.
        max_concurrent_runs:
          type: integer
          description: >-
            Maximum number of concurrent runs for the job. Setting to 1
            ensures only one run at a time.
          default: 1
        git_source:
          $ref: '#/components/schemas/GitSource'
        tags:
          type: object
          additionalProperties:
            type: string
          description: Tags for the job.
        format:
          type: string
          enum:
            - SINGLE_TASK
            - MULTI_TASK
          description: The format of the job.
        queue:
          type: object
          properties:
            enabled:
              type: boolean
          description: Queue settings for the job.
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              default:
                type: string
          description: Job-level parameter definitions.
        run_as:
          type: object
          properties:
            user_name:
              type: string
            service_principal_name:
              type: string
          description: Identity to run the job as.
        access_control_list:
          type: array
          items:
            $ref: '#/components/schemas/AccessControlRequest'
    TaskSettings:
      type: object
      required:
        - task_key
      properties:
        task_key:
          type: string
          description: >-
            A unique key for the task within the job. Used to reference the
            task in dependencies and logging.
          examples:
            - etl_task_1
        description:
          type: string
          description: A description of the task.
        depends_on:
          type: array
          items:
            type: object
            properties:
              task_key:
                type: string
              outcome:
                type: string
          description: >-
            An array of objects specifying the task dependencies. Each
            dependency is identified by its task_key.
        existing_cluster_id:
          type: string
          description: An existing cluster to run the task on.
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
        job_cluster_key:
          type: string
          description: Reference to a job_clusters entry.
        notebook_task:
          type: object
          properties:
            notebook_path:
              type: string
              description: The absolute path of the notebook in the workspace.
            source:
              type: string
              enum:
                - WORKSPACE
                - GIT
              description: The source of the notebook.
            base_parameters:
              type: object
              additionalProperties:
                type: string
              description: >-
                Base parameters to pass to the notebook. These can be
                overridden at run time.
        spark_jar_task:
          type: object
          properties:
            main_class_name:
              type: string
            parameters:
              type: array
              items:
                type: string
            jar_uri:
              type: string
        spark_python_task:
          type: object
          properties:
            python_file:
              type: string
              description: URI of the Python file to execute.
            parameters:
              type: array
              items:
                type: string
            source:
              type: string
              enum:
                - WORKSPACE
                - GIT
        spark_submit_task:
          type: object
          properties:
            parameters:
              type: array
              items:
                type: string
        pipeline_task:
          type: object
          properties:
            pipeline_id:
              type: string
            full_refresh:
              type: boolean
        python_wheel_task:
          type: object
          properties:
            package_name:
              type: string
            entry_point:
              type: string
            parameters:
              type: array
              items:
                type: string
            named_parameters:
              type: object
              additionalProperties:
                type: string
        sql_task:
          type: object
          properties:
            query:
              type: object
              properties:
                query_id:
                  type: string
            dashboard:
              type: object
              properties:
                dashboard_id:
                  type: string
            alert:
              type: object
              properties:
                alert_id:
                  type: string
            warehouse_id:
              type: string
            parameters:
              type: object
              additionalProperties:
                type: string
        dbt_task:
          type: object
          properties:
            project_directory:
              type: string
            commands:
              type: array
              items:
                type: string
            schema:
              type: string
            warehouse_id:
              type: string
            catalog:
              type: string
            profiles_directory:
              type: string
        run_if:
          type: string
          enum:
            - ALL_SUCCESS
            - AT_LEAST_ONE_SUCCESS
            - NONE_FAILED
            - ALL_DONE
            - AT_LEAST_ONE_FAILED
            - ALL_FAILED
          description: Condition to run this task.
        timeout_seconds:
          type: integer
          description: Timeout for this individual task.
        max_retries:
          type: integer
          description: Maximum number of retries for a failed task.
        min_retry_interval_millis:
          type: integer
          description: Minimum interval between retry attempts.
        retry_on_timeout:
          type: boolean
          description: Whether to retry when the task times out.
        email_notifications:
          $ref: '#/components/schemas/JobEmailNotifications'
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/Library'
          description: Libraries to install on the cluster running this task.
    JobCluster:
      type: object
      required:
        - job_cluster_key
        - new_cluster
      properties:
        job_cluster_key:
          type: string
          description: >-
            A unique key for the job cluster. Referenced by tasks using
            job_cluster_key.
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
    JobEmailNotifications:
      type: object
      properties:
        on_start:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run starts.
        on_success:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run succeeds.
        on_failure:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run fails.
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: string
        no_alert_for_skipped_runs:
          type: boolean
    WebhookNotifications:
      type: object
      properties:
        on_start:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
        on_success:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
        on_failure:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
    CronSchedule:
      type: object
      required:
        - quartz_cron_expression
        - timezone_id
      properties:
        quartz_cron_expression:
          type: string
          description: >-
            A Quartz cron expression describing the schedule. See
            http://www.quartz-scheduler.org/documentation/quartz-2.3.0/tutorials/crontrigger.html
          examples:
            - 0 0 8 * * ?
        timezone_id:
          type: string
          description: A Java timezone ID. The schedule is resolved relative to this timezone.
          examples:
            - America/Los_Angeles
        pause_status:
          type: string
          enum:
            - PAUSED
            - UNPAUSED
          description: Whether the schedule is paused.
    GitSource:
      type: object
      required:
        - git_url
        - git_provider
      properties:
        git_url:
          type: string
          description: URL of the Git repository.
        git_provider:
          type: string
          enum:
            - gitHub
            - bitbucketCloud
            - gitLab
            - azureDevOpsServices
            - gitHubEnterprise
            - bitbucketServer
            - gitLabEnterpriseEdition
            - awsCodeCommit
          description: The Git provider.
        git_branch:
          type: string
          description: Branch to use.
        git_tag:
          type: string
          description: Tag to use.
        git_commit:
          type: string
          description: Commit hash to use.
    Library:
      type: object
      properties:
        jar:
          type: string
          description: URI of a JAR to install.
        egg:
          type: string
          description: URI of an egg to install (deprecated).
        whl:
          type: string
          description: URI of a wheel to install.
        pypi:
          type: object
          properties:
            package:
              type: string
              description: >-
                The name of the PyPI package to install. An optional version
                specification can be included.
            repo:
              type: string
              description: The repository URL.
        maven:
          type: object
          properties:
            coordinates:
              type: string
              description: Maven coordinates in the form groupId:artifactId:version.
            repo:
              type: string
            exclusions:
              type: array
              items:
                type: string
        cran:
          type: object
          properties:
            package:
              type: string
              description: The name of the CRAN package.
            repo:
              type: string
        requirements:
          type: string
          description: Path to a requirements.txt file.
    AccessControlRequest:
      type: object
      properties:
        user_name:
          type: string
        group_name:
          type: string
        service_principal_name:
          type: string
        permission_level:
          type: string
          enum:
            - CAN_MANAGE
            - CAN_MANAGE_RUN
            - CAN_VIEW
            - IS_OWNER
    JobSettings:
      type: object
      properties:
        name:
          type: string
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSettings'
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
        email_notifications:
          $ref: '#/components/schemas/JobEmailNotifications'
        webhook_notifications:
          $ref: '#/components/schemas/WebhookNotifications'
        timeout_seconds:
          type: integer
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        max_concurrent_runs:
          type: integer
        git_source:
          $ref: '#/components/schemas/GitSource'
        tags:
          type: object
          additionalProperties:
            type: string
        format:
          type: string
          enum:
            - SINGLE_TASK
            - MULTI_TASK
        queue:
          type: object
          properties:
            enabled:
              type: boolean
        continuous:
          type: object
          properties:
            pause_status:
              type: string
              enum:
                - PAUSED
                - UNPAUSED
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              default:
                type: string
        run_as:
          type: object
          properties:
            user_name:
              type: string
            service_principal_name:
              type: string
    Job:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
          description: The canonical identifier for this job.
        creator_user_name:
          type: string
          description: The email of the user who created the job.
        run_as_user_name:
          type: string
          description: The email of the user the job runs as.
        settings:
          $ref: '#/components/schemas/JobSettings'
        created_time:
          type: integer
          format: int64
          description: The time the job was created in epoch milliseconds.
    Run:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
        run_id:
          type: integer
          format: int64
          description: The canonical identifier of the run.
        run_name:
          type: string
        number_in_job:
          type: integer
          format: int64
        original_attempt_run_id:
          type: integer
          format: int64
        state:
          type: object
          properties:
            life_cycle_state:
              type: string
              enum:
                - PENDING
                - RUNNING
                - TERMINATING
                - TERMINATED
                - SKIPPED
                - INTERNAL_ERROR
                - BLOCKED
                - WAITING_FOR_RETRY
                - QUEUED
              description: The current life cycle state of the run.
            result_state:
              type: string
              enum:
                - SUCCESS
                - FAILED
                - TIMEDOUT
                - CANCELED
                - MAXIMUM_CONCURRENT_RUNS_REACHED
                - EXCLUDED
                - SUCCESS_WITH_FAILURES
                - UPSTREAM_FAILED
                - UPSTREAM_CANCELED
              description: The result state of the run, if completed.
            state_message:
              type: string
              description: A descriptive message for the current state.
            user_cancelled_or_timedout:
              type: boolean
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/RunTask'
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
        cluster_spec:
          type: object
          properties:
            existing_cluster_id:
              type: string
            new_cluster:
              $ref: '#/components/schemas/CreateClusterRequest'
            libraries:
              type: array
              items:
                $ref: '#/components/schemas/Library'
        cluster_instance:
          type: object
          properties:
            cluster_id:
              type: string
            spark_context_id:
              type: string
        start_time:
          type: integer
          format: int64
          description: The start time of the run in epoch milliseconds.
        setup_duration:
          type: integer
          format: int64
          description: Setup duration in milliseconds.
        execution_duration:
          type: integer
          format: int64
          description: Execution duration in milliseconds.
        cleanup_duration:
          type: integer
          format: int64
          description: Cleanup duration in milliseconds.
        end_time:
          type: integer
          format: int64
          description: End time in epoch milliseconds.
        trigger:
          type: string
          enum:
            - PERIODIC
            - ONE_TIME
            - RETRY
            - RUN_JOB_TASK
            - FILE_ARRIVAL
        run_type:
          type: string
          enum:
            - JOB_RUN
            - WORKFLOW_RUN
            - SUBMIT_RUN
        attempt_number:
          type: integer
        creator_user_name:
          type: string
        run_page_url:
          type: string
          description: URL of the run page in the Databricks workspace.
        format:
          type: string
          enum:
            - SINGLE_TASK
            - MULTI_TASK
        git_source:
          $ref: '#/components/schemas/GitSource'
    RunTask:
      type: object
      properties:
        run_id:
          type: integer
          format: int64
        task_key:
          type: string
        description:
          type: string
        state:
          type: object
          properties:
            life_cycle_state:
              type: string
            result_state:
              type: string
            state_message:
              type: string
        depends_on:
          type: array
          items:
            type: object
            properties:
              task_key:
                type: string
        existing_cluster_id:
          type: string
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
        notebook_task:
          type: object
          properties:
            notebook_path:
              type: string
            source:
              type: string
            base_parameters:
              type: object
              additionalProperties:
                type: string
        spark_jar_task:
          type: object
          properties:
            main_class_name:
              type: string
            parameters:
              type: array
              items:
                type: string
        spark_python_task:
          type: object
          properties:
            python_file:
              type: string
            parameters:
              type: array
              items:
                type: string
        sql_task:
          type: object
          properties:
            query:
              type: object
              properties:
                query_id:
                  type: string
            warehouse_id:
              type: string
        start_time:
          type: integer
          format: int64
        setup_duration:
          type: integer
          format: int64
        execution_duration:
          type: integer
          format: int64
        cleanup_duration:
          type: integer
          format: int64
        end_time:
          type: integer
          format: int64
        cluster_instance:
          type: object
          properties:
            cluster_id:
              type: string
            spark_context_id:
              type: string
        attempt_number:
          type: integer
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/Library'
    WorkspaceObject:
      type: object
      properties:
        object_type:
          type: string
          enum:
            - NOTEBOOK
            - DIRECTORY
            - LIBRARY
            - FILE
            - REPO
            - DASHBOARD
          description: The type of the workspace object.
        path:
          type: string
          description: The absolute path of the object in the workspace.
        language:
          type: string
          enum:
            - SCALA
            - PYTHON
            - SQL
            - R
          description: >-
            The language of the notebook, if applicable. Only present for
            notebook objects.
        object_id:
          type: integer
          format: int64
          description: The unique identifier of the object.
        created_at:
          type: integer
          format: int64
          description: The creation time in epoch milliseconds.
        modified_at:
          type: integer
          format: int64
          description: The last modified time in epoch milliseconds.
        resource_id:
          type: string
          description: Unique identifier for SCIM compliance.
        size:
          type: integer
          format: int64
          description: The file size in bytes (for FILE objects).
    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          description: A machine-readable error code.
          examples:
            - RESOURCE_DOES_NOT_EXIST
        message:
          type: string
          description: A human-readable error message.
          examples:
            - Cluster 1234-567890-abcde123 does not exist
  responses:
    BadRequest:
      description: The request is malformed or contains invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: >-
        The request lacks valid authentication credentials. Verify your
        access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: >-
        The authenticated user does not have permission to perform this
        action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: >-
        Too many requests have been sent in a given amount of time. Retry
        after the period specified in the Retry-After header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: >-
        An unexpected error occurred on the server. If the problem persists,
        contact Databricks support.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

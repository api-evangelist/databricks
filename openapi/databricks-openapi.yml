              type: array
              items:
                type: string
            source:
              type: string
              enum:
              - WORKSPACE
              - GIT
          example: example_value
        spark_submit_task:
          type: object
          properties:
            parameters:
              type: array
              items:
                type: string
          example: example_value
        pipeline_task:
          type: object
          properties:
            pipeline_id:
              type: string
            full_refresh:
              type: boolean
          example: example_value
        python_wheel_task:
          type: object
          properties:
            package_name:
              type: string
            entry_point:
              type: string
            parameters:
              type: array
              items:
                type: string
            named_parameters:
              type: object
              additionalProperties:
                type: string
          example: example_value
        sql_task:
          type: object
          properties:
            query:
              type: object
              properties:
                query_id:
                  type: string
            dashboard:
              type: object
              properties:
                dashboard_id:
                  type: string
            alert:
              type: object
              properties:
                alert_id:
                  type: string
            warehouse_id:
              type: string
            parameters:
              type: object
              additionalProperties:
                type: string
          example: example_value
        dbt_task:
          type: object
          properties:
            project_directory:
              type: string
            commands:
              type: array
              items:
                type: string
            schema:
              type: string
            warehouse_id:
              type: string
            catalog:
              type: string
            profiles_directory:
              type: string
          example: example_value
        run_if:
          type: string
          enum:
          - ALL_SUCCESS
          - AT_LEAST_ONE_SUCCESS
          - NONE_FAILED
          - ALL_DONE
          - AT_LEAST_ONE_FAILED
          - ALL_FAILED
          description: Condition to run this task.
          example: ALL_SUCCESS
        timeout_seconds:
          type: integer
          description: Timeout for this individual task.
          example: 10
        max_retries:
          type: integer
          description: Maximum number of retries for a failed task.
          example: 10
        min_retry_interval_millis:
          type: integer
          description: Minimum interval between retry attempts.
          example: 10
        retry_on_timeout:
          type: boolean
          description: Whether to retry when the task times out.
          example: true
        email_notifications:
          $ref: '#/components/schemas/JobEmailNotifications'
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/Library'
          description: Libraries to install on the cluster running this task.
          example: []
    JobCluster:
      type: object
      required:

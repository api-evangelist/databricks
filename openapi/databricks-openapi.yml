      - new_cluster
      properties:
        job_cluster_key:
          type: string
          description: >-
            A unique key for the job cluster. Referenced by tasks using
            job_cluster_key.
          example: example_value
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
    JobEmailNotifications:
      type: object
      properties:
        on_start:
          type: array

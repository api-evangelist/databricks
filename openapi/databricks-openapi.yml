                  type: string
                  description: >-
                    The base64-encoded content to import. Limit is 10 MB.
                overwrite:
                  type: boolean
                  description: >-
                    If true, the existing object is overwritten. Default is false.
                  default: false
            examples:
              ImportworkspaceobjectRequestExample:
                summary: Default importWorkspaceObject request
                x-microcks-default: true
                value:
                  path: example_value
                  format: SOURCE
                  language: SCALA
                  content: example_value
                  overwrite: true
      responses:
        '200':
          description: Object imported successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /2.0/workspace/delete:
    post:
      operationId: deleteWorkspaceObject
      summary: Databricks Delete a Workspace Object
      description: >-
        Deletes an object or a directory and optionally all of its contents. If
        the path does not exist, a RESOURCE_DOES_NOT_EXIST error is returned.
        If path is a non-empty directory and recursive is false, a
        DIRECTORY_NOT_EMPTY error is returned.
      tags:
      - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - path
              properties:
                path:
                  type: string
                  description: >-
                    The absolute path of the object to delete. Must start with /.
                recursive:
                  type: boolean
                  description: >-
                    If true, all contents of the directory are recursively deleted.
                    Required for non-empty directories.
                  default: false
            examples:
              DeleteworkspaceobjectRequestExample:
                summary: Default deleteWorkspaceObject request
                x-microcks-default: true
                value:
                  path: example_value
                  recursive: true
      responses:
        '200':
          description: Object deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /2.0/workspace/mkdirs:
    post:
      operationId: createWorkspaceDirectory
      summary: Databricks Create a Directory
      description: >-
        Creates the given directory and necessary parent directories if they
        do not exist. If there is an object (not a directory) at any prefix
        of the input path, a RESOURCE_ALREADY_EXISTS error is returned.
      tags:
      - Workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - path
              properties:
                path:
                  type: string
                  description: >-
                    The absolute path of the directory to create. Must start
                    with /.
            examples:
              CreateworkspacedirectoryRequestExample:
                summary: Default createWorkspaceDirectory request
                x-microcks-default: true
                value:
                  path: example_value
      responses:
        '200':
          description: Directory created successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PAT
      description: >-
        Databricks personal access token (PAT) or OAuth M2M token. Pass the
        token in the Authorization header as 'Bearer <token>'.
  schemas:
    CreateClusterRequest:
      type: object
      required:
      - cluster_name
      - spark_version
      - node_type_id
      properties:
        cluster_name:
          type: string
          description: >-
            A human-readable name for the cluster. This does not need to be
            unique.
          examples:
          - my-data-cluster
        spark_version:
          type: string
          description: >-
            The runtime version of the cluster. You can retrieve a list of
            available runtime versions using the Runtime Versions API.
          examples:
          - 14.3.x-scala2.12
        node_type_id:
          type: string
          description: >-
            The node type for worker nodes. This field determines the cloud
            provider instance type.
          examples:
          - i3.xlarge
        driver_node_type_id:
          type: string
          description: >-
            The node type for the Spark driver. If not specified, defaults
            to the same value as node_type_id.
          example: '500123'
        num_workers:
          type: integer
          description: >-
            Number of worker nodes for a fixed-size cluster. A cluster has
            one Spark driver and num_workers executors. Set to 0 for a
            single-node cluster.
          examples:
          - 2
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        spark_conf:
          type: object
          additionalProperties:
            type: string
          description: >-
            A map of Spark configuration key-value pairs. These override the
            default Spark configuration values.
          example: example_value
        aws_attributes:
          $ref: '#/components/schemas/AwsAttributes'
        azure_attributes:
          $ref: '#/components/schemas/AzureAttributes'
        gcp_attributes:
          $ref: '#/components/schemas/GcpAttributes'
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: >-
            Additional tags for cluster resources. Tags are propagated to the
            cloud provider for cost tracking.
          example: example_value
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
          description: >-
            Environment variables for all Spark processes. Use
            {{secrets/scope/key}} to reference secrets.
          example: example_value
        autotermination_minutes:
          type: integer
          description: >-
            Minutes of inactivity after which the cluster is automatically
            terminated. 0 disables auto-termination.
          default: 120
          example: 10
        enable_elastic_disk:
          type: boolean
          description: >-
            Whether to autoscale local storage. When enabled, Databricks
            monitors disk usage and attaches additional disks as needed.
          example: true
        instance_pool_id:
          type: string
          description: >-
            The optional ID of the instance pool to use for cluster nodes.
          example: '500123'
        policy_id:
          type: string
          description: >-
            The ID of the cluster policy to apply. Cluster policies constrain
            the configuration settings.
          example: '500123'
        enable_local_disk_encryption:
          type: boolean
          description: Whether to encrypt data on local disks.
          example: true
        runtime_engine:
          type: string
          enum:
          - STANDARD
          - PHOTON
          description: >-
            The runtime engine. PHOTON enables the Photon vectorized query
            engine for faster performance.
          example: STANDARD
        data_security_mode:
          type: string
          enum:
          - NONE
          - SINGLE_USER
          - USER_ISOLATION
          - LEGACY_TABLE_ACL
          - LEGACY_PASSTHROUGH
          - LEGACY_SINGLE_USER
          - LEGACY_SINGLE_USER_STANDARD
          description: Data security mode for the cluster.
          example: NONE
        single_user_name:
          type: string
          description: >-
            The user name (email) of the single user for SINGLE_USER access mode.
          example: example_value
        init_scripts:
          type: array
          items:
            $ref: '#/components/schemas/InitScriptInfo'
          description: Init scripts to run when the cluster starts.
          example: []
        ssh_public_keys:
          type: array
          items:
            type: string
          description: SSH public keys to add to each Spark node.
          example: []
    EditClusterRequest:
      type: object
      required:
      - cluster_id
      - cluster_name
      - spark_version
      - node_type_id
      properties:
        cluster_id:
          type: string
          description: The unique identifier of the cluster to edit.
          example: '500123'
        cluster_name:
          type: string
          description: The new name for the cluster.
          example: example_value
        spark_version:
          type: string
          description: The runtime version.
          example: example_value
        node_type_id:
          type: string
          description: The node type for worker nodes.
          example: '500123'
        driver_node_type_id:
          type: string
          description: The node type for the Spark driver.
          example: '500123'
        num_workers:
          type: integer
          description: Number of worker nodes.
          example: 10
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        spark_conf:
          type: object
          additionalProperties:
            type: string
          example: example_value
        custom_tags:
          type: object
          additionalProperties:
            type: string
          example: example_value
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
          example: example_value
        autotermination_minutes:
          type: integer
          example: 10
        enable_elastic_disk:
          type: boolean
          example: true
        instance_pool_id:
          type: string
          example: '500123'
        policy_id:
          type: string
          example: '500123'
        data_security_mode:
          type: string
          enum:
          - NONE
          - SINGLE_USER
          - USER_ISOLATION
          - LEGACY_TABLE_ACL
          - LEGACY_PASSTHROUGH
          - LEGACY_SINGLE_USER
          - LEGACY_SINGLE_USER_STANDARD
          example: NONE
        single_user_name:
          type: string
          example: example_value
        runtime_engine:
          type: string
          enum:
          - STANDARD
          - PHOTON
          example: STANDARD
    ClusterDetails:
      type: object
      properties:
        cluster_id:
          type: string
          description: The unique identifier of the cluster.
          example: '500123'
        cluster_name:
          type: string
          description: The human-readable name of the cluster.
          example: example_value
        spark_version:
          type: string
          description: The runtime version of the cluster.
          example: example_value
        node_type_id:
          type: string
          description: The node type for worker nodes.
          example: '500123'
        driver_node_type_id:
          type: string
          description: The node type for the Spark driver.
          example: '500123'
        num_workers:
          type: integer
          description: Number of worker nodes.
          example: 10
        autoscale:
          $ref: '#/components/schemas/AutoScale'
        state:
          type: string
          enum:
          - PENDING
          - RUNNING
          - RESTARTING
          - RESIZING
          - TERMINATING
          - TERMINATED
          - ERROR
          - UNKNOWN
          description: The current state of the cluster.
          example: PENDING
        state_message:
          type: string
          description: A message about the state of the cluster.
          example: example_value
        start_time:
          type: integer
          format: int64
          description: The time the cluster was started in epoch milliseconds.
          example: 10
        terminated_time:
          type: integer
          format: int64
          description: The time the cluster was terminated in epoch milliseconds.
          example: 10
        last_state_loss_time:
          type: integer
          format: int64
          description: >-
            The time when the cluster driver last lost its state in epoch
            milliseconds.
          example: 10
        last_activity_time:
          type: integer
          format: int64
          description: The time of the last user activity on the cluster.
          example: 10
        last_restarted_time:
          type: integer
          format: int64
          description: The time the cluster was last restarted.
          example: 10
        creator_user_name:
          type: string
          description: The email of the user who created the cluster.
          example: example_value
        cluster_source:
          type: string
          enum:
          - UI
          - API
          - JOB
          - MODELS
          - PIPELINE
          - PIPELINE_MAINTENANCE
          - SQL
          - SOME_OTHER_SOURCE
          description: The source that created the cluster.
          example: UI
        spark_conf:
          type: object
          additionalProperties:
            type: string
          description: Spark configuration key-value pairs.
          example: example_value
        custom_tags:
          type: object
          additionalProperties:
            type: string
          description: Tags applied to the cluster.
          example: example_value
        spark_env_vars:
          type: object
          additionalProperties:
            type: string
          example: example_value
        autotermination_minutes:
          type: integer
          description: Auto-termination idle timeout in minutes.
          example: 10
        enable_elastic_disk:
          type: boolean
          example: true
        instance_pool_id:
          type: string
          example: '500123'
        policy_id:
          type: string
          example: '500123'
        data_security_mode:
          type: string
          example: example_value
        single_user_name:
          type: string
          example: example_value
        runtime_engine:
          type: string
          example: example_value
        default_tags:
          type: object
          additionalProperties:
            type: string
          description: Default tags applied by Databricks.
          example: example_value
        cluster_log_status:
          type: object
          properties:
            last_attempted:
              type: integer
              format: int64
            last_exception:
              type: string
          example: example_value
        termination_reason:
          type: object
          properties:
            code:
              type: string
              description: Status code for the termination reason.
            type:
              type: string
              description: Termination type.
            parameters:
              type: object
              additionalProperties:
                type: string
          example: example_value
        disk_spec:
          type: object
          properties:
            disk_count:
              type: integer
            disk_size:
              type: integer
            disk_type:
              type: object
              properties:
                azure_disk_volume_type:
                  type: string
                ebs_volume_type:
                  type: string
          example: example_value
        driver:
          $ref: '#/components/schemas/SparkNode'
        executors:
          type: array
          items:
            $ref: '#/components/schemas/SparkNode'
          example: []
        jdbc_port:
          type: integer
          description: Port on the driver for JDBC/ODBC connections.
          example: 10
        spark_context_id:
          type: integer
          format: int64
          description: The canonical Spark context identifier.
          example: '500123'
    SparkNode:
      type: object
      properties:
        private_ip:
          type: string
          example: example_value
        public_dns:
          type: string
          example: example_value
        node_id:
          type: string
          example: '500123'
        instance_id:
          type: string
          example: '500123'
        start_timestamp:
          type: integer
          format: int64
          example: 10
        host_private_ip:
          type: string
          example: example_value
    AutoScale:
      type: object
      properties:
        min_workers:
          type: integer
          description: The minimum number of workers the cluster can scale down to.
          example: 10
        max_workers:
          type: integer
          description: The maximum number of workers the cluster can scale up to.
          example: 10
      description: >-
        Autoscaling configuration. When set, num_workers is ignored and the
        cluster scales between min_workers and max_workers.
    AwsAttributes:
      type: object
      properties:
        first_on_demand:
          type: integer
          description: Number of on-demand instances to place first.
          example: 10
        availability:
          type: string
          enum:
          - SPOT
          - ON_DEMAND
          - SPOT_WITH_FALLBACK
          example: SPOT
        zone_id:
          type: string
          description: The availability zone identifier (e.g., us-west-2a).
          example: '500123'
        instance_profile_arn:
          type: string
          description: IAM instance profile ARN for the cluster instances.
          example: example_value
        spot_bid_price_percent:
          type: integer
          description: Max bid price as percentage of on-demand price.
          example: 10
        ebs_volume_type:
          type: string
          enum:
          - GENERAL_PURPOSE_SSD
          - THROUGHPUT_OPTIMIZED_HDD
          example: GENERAL_PURPOSE_SSD
        ebs_volume_count:
          type: integer
          example: 10
        ebs_volume_size:
          type: integer
          example: 10
    AzureAttributes:
      type: object
      properties:
        first_on_demand:
          type: integer
          example: 10
        availability:
          type: string
          enum:
          - SPOT_AZURE
          - ON_DEMAND_AZURE
          - SPOT_WITH_FALLBACK_AZURE
          example: SPOT_AZURE
        spot_bid_max_price:
          type: number
          example: 42.5
    GcpAttributes:
      type: object
      properties:
        use_preemptible_executors:
          type: boolean
          example: true
        google_service_account:
          type: string
          example: example_value
        availability:
          type: string
          enum:
          - GCP_PREEMPTIBLE
          - GCP_ON_DEMAND
          example: GCP_PREEMPTIBLE
    InitScriptInfo:
      type: object
      properties:
        workspace:
          type: object
          properties:
            destination:
              type: string
          example: example_value
        volumes:
          type: object
          properties:
            destination:
              type: string
          example: example_value
        dbfs:
          type: object
          properties:
            destination:
              type: string
          deprecated: true
          example: example_value
    ClusterEvent:
      type: object
      properties:
        cluster_id:
          type: string
          example: '500123'
        timestamp:
          type: integer
          format: int64
          example: 10
        type:
          type: string
          example: example_value
        details:
          type: object
          properties:
            current_num_workers:
              type: integer
            target_num_workers:
              type: integer
            previous_attributes:
              type: object
            attributes:
              type: object
            previous_cluster_size:
              type: object
            cluster_size:
              type: object
            cause:
              type: string
            reason:
              type: object
              properties:
                code:
                  type: string
                type:
                  type: string
                parameters:
                  type: object
                  additionalProperties:
                    type: string
          example: example_value
    CreateJobRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the job.
          examples:
          - my-etl-job
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSettings'
          description: >-
            A list of task specifications to be executed by this job. For
            single-task jobs, use the top-level task fields instead.
          example: []
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
          description: >-
            A list of job cluster specifications that can be shared and

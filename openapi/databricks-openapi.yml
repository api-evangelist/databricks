          type: boolean
          default: false
        example: true
      - name: completed_only
        in: query
        required: false
        description: If true, only completed runs are included in the results.
        schema:
          type: boolean
          default: false
        example: true
      - name: offset
        in: query
        required: false
        description: The offset of the first run to return.
        schema:
          type: integer
          default: 0
        example: 10
      - name: limit
        in: query
        required: false
        description: The number of runs to return (max 25).
        schema:
          type: integer
          default: 25
          maximum: 25
        example: 10
      - name: run_type
        in: query
        required: false
        description: The type of runs to return.

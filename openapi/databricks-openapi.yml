              properties:
                job_id:
                  type: integer
                  format: int64
                  description: The canonical identifier of the job to run.
                idempotency_token:
                  type: string
                  description: >-
                    An optional token to guarantee the idempotency of job run
                    requests. Reusing the token with a different run will cause
                    the request to fail.
                jar_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for JAR tasks.
                notebook_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of key-value pairs for notebook parameters.
                python_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for Python tasks.
                spark_submit_params:
                  type: array
                  items:
                    type: string
                  description: Parameters for Spark submit tasks.
                python_named_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of named parameters for Python tasks.
                pipeline_params:
                  type: object
                  properties:
                    full_refresh:
                      type: boolean
                      description: Whether to run a full refresh of the pipeline.
                  description: Parameters for pipeline tasks.
                sql_params:
                  type: object
                  additionalProperties:
                    type: string
                  description: A map of named parameters for SQL tasks.
            examples:
              RunjobnowRequestExample:
                summary: Default runJobNow request
                x-microcks-default: true
                value:
                  job_id: '500123'
                  idempotency_token: example_value
                  jar_params:
                  - example_value
                  notebook_params: example_value
                  python_params:
                  - example_value
                  spark_submit_params:
                  - example_value
                  python_named_params: example_value
                  pipeline_params:
                    full_refresh: true
                  sql_params: example_value
      responses:
        '200':
          description: Job run triggered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: integer
                    format: int64
                    description: The globally unique ID of the newly triggered run.
                  number_in_job:
                    type: integer
                    format: int64
                    description: >-
                      A unique identifier for this run within the job. This is
                      an auto-incrementing value.

            type: string
          description: Email addresses to notify when a run starts.
          example: []
        on_success:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run succeeds.
          example: []
        on_failure:
          type: array
          items:
            type: string
          description: Email addresses to notify when a run fails.
          example: []
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: string
          example: []
        no_alert_for_skipped_runs:
          type: boolean
          example: true
    WebhookNotifications:
      type: object
      properties:
        on_start:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
        on_success:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
        on_failure:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
        on_duration_warning_threshold_exceeded:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
          example: []
    CronSchedule:
      type: object
      required:
      - quartz_cron_expression
      - timezone_id
      properties:
        quartz_cron_expression:
          type: string
          description: >-
            A Quartz cron expression describing the schedule. See
            http://www.quartz-scheduler.org/documentation/quartz-2.3.0/tutorials/crontrigger.html
          examples:
          - 0 0 8 * * ?
        timezone_id:
          type: string
          description: A Java timezone ID. The schedule is resolved relative to this timezone.
          examples:
          - America/Los_Angeles
        pause_status:
          type: string
          enum:
          - PAUSED
          - UNPAUSED
          description: Whether the schedule is paused.
          example: PAUSED
    GitSource:
      type: object
      required:
      - git_url
      - git_provider
      properties:
        git_url:
          type: string
          description: URL of the Git repository.
          example: https://www.example.com
        git_provider:
          type: string
          enum:
          - gitHub
          - bitbucketCloud
          - gitLab
          - azureDevOpsServices
          - gitHubEnterprise
          - bitbucketServer
          - gitLabEnterpriseEdition
          - awsCodeCommit
          description: The Git provider.
          example: gitHub
        git_branch:
          type: string
          description: Branch to use.
          example: example_value
        git_tag:
          type: string
          description: Tag to use.
          example: example_value
        git_commit:
          type: string
          description: Commit hash to use.
          example: example_value
    Library:
      type: object
      properties:
        jar:
          type: string
          description: URI of a JAR to install.
          example: example_value
        egg:
          type: string
          description: URI of an egg to install (deprecated).
          example: example_value
        whl:
          type: string
          description: URI of a wheel to install.
          example: example_value
        pypi:
          type: object
          properties:
            package:
              type: string
              description: >-
                The name of the PyPI package to install. An optional version
                specification can be included.
            repo:
              type: string
              description: The repository URL.
          example: example_value
        maven:
          type: object
          properties:
            coordinates:
              type: string
              description: Maven coordinates in the form groupId:artifactId:version.
            repo:
              type: string
            exclusions:
              type: array
              items:
                type: string
          example: example_value
        cran:
          type: object
          properties:
            package:
              type: string
              description: The name of the CRAN package.
            repo:
              type: string
          example: example_value
        requirements:
          type: string
          description: Path to a requirements.txt file.
          example: example_value
    AccessControlRequest:
      type: object
      properties:
        user_name:
          type: string
          example: example_value
        group_name:
          type: string
          example: example_value
        service_principal_name:
          type: string
          example: example_value
        permission_level:
          type: string
          enum:
          - CAN_MANAGE
          - CAN_MANAGE_RUN
          - CAN_VIEW
          - IS_OWNER
          example: CAN_MANAGE
    JobSettings:
      type: object
      properties:
        name:
          type: string
          example: Example Title
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSettings'

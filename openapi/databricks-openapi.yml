      - task_key
      properties:
        task_key:
          type: string
          description: >-
            A unique key for the task within the job. Used to reference the
            task in dependencies and logging.
          examples:
          - etl_task_1
        description:
          type: string
          description: A description of the task.
          example: A sample description.
        depends_on:
          type: array
          items:
            type: object
            properties:
              task_key:
                type: string
              outcome:
                type: string
          description: >-
            An array of objects specifying the task dependencies. Each
            dependency is identified by its task_key.
          example: []
        existing_cluster_id:
          type: string
          description: An existing cluster to run the task on.
          example: '500123'
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
        job_cluster_key:
          type: string
          description: Reference to a job_clusters entry.
          example: example_value
        notebook_task:
          type: object
          properties:
            notebook_path:
              type: string

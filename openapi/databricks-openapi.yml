            base_parameters:
              type: object
              additionalProperties:
                type: string
              description: >-
                Base parameters to pass to the notebook. These can be
                overridden at run time.
          example: example_value
        spark_jar_task:
          type: object
          properties:
            main_class_name:
              type: string
            parameters:
              type: array
              items:
                type: string
            jar_uri:
              type: string
          example: example_value
        spark_python_task:
          type: object
          properties:

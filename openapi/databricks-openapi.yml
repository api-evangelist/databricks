        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
          example: []
        email_notifications:
          $ref: '#/components/schemas/JobEmailNotifications'
        webhook_notifications:
          $ref: '#/components/schemas/WebhookNotifications'
        timeout_seconds:
          type: integer
          example: 10
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        max_concurrent_runs:
          type: integer
          example: 10
        git_source:
          $ref: '#/components/schemas/GitSource'
        tags:
          type: object
          additionalProperties:
            type: string
          example: example_value
        format:
          type: string
          enum:
          - SINGLE_TASK
          - MULTI_TASK
          example: SINGLE_TASK
        queue:
          type: object
          properties:
            enabled:
              type: boolean
          example: example_value
        continuous:
          type: object
          properties:
            pause_status:
              type: string
              enum:
              - PAUSED
              - UNPAUSED
          example: example_value
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              default:
                type: string
          example: []
        run_as:
          type: object
          properties:
            user_name:
              type: string
            service_principal_name:
              type: string
          example: example_value
    Job:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
          description: The canonical identifier for this job.
          example: '500123'
        creator_user_name:
          type: string
          description: The email of the user who created the job.
          example: example_value
        run_as_user_name:
          type: string
          description: The email of the user the job runs as.
          example: example_value
        settings:
          $ref: '#/components/schemas/JobSettings'
        created_time:
          type: integer
          format: int64
          description: The time the job was created in epoch milliseconds.
          example: 10
    Run:
      type: object
      properties:
        job_id:
          type: integer
          format: int64
          example: '500123'
        run_id:
          type: integer
          format: int64
          description: The canonical identifier of the run.
          example: '500123'
        run_name:
          type: string
          example: example_value
        number_in_job:
          type: integer
          format: int64
          example: 10
        original_attempt_run_id:
          type: integer
          format: int64
          example: '500123'
        state:
          type: object
          properties:
            life_cycle_state:
              type: string
              enum:
              - PENDING
              - RUNNING
              - TERMINATING
              - TERMINATED
              - SKIPPED
              - INTERNAL_ERROR
              - BLOCKED
              - WAITING_FOR_RETRY
              - QUEUED
              description: The current life cycle state of the run.
            result_state:
              type: string
              enum:
              - SUCCESS
              - FAILED
              - TIMEDOUT
              - CANCELED
              - MAXIMUM_CONCURRENT_RUNS_REACHED
              - EXCLUDED
              - SUCCESS_WITH_FAILURES
              - UPSTREAM_FAILED
              - UPSTREAM_CANCELED
              description: The result state of the run, if completed.
            state_message:
              type: string
              description: A descriptive message for the current state.
            user_cancelled_or_timedout:
              type: boolean
          example: example_value
        schedule:
          $ref: '#/components/schemas/CronSchedule'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/RunTask'
          example: []
        job_clusters:
          type: array
          items:
            $ref: '#/components/schemas/JobCluster'
          example: []
        cluster_spec:
          type: object
          properties:
            existing_cluster_id:
              type: string
            new_cluster:
              $ref: '#/components/schemas/CreateClusterRequest'
            libraries:
              type: array
              items:
                $ref: '#/components/schemas/Library'
          example: example_value
        cluster_instance:
          type: object
          properties:
            cluster_id:
              type: string
            spark_context_id:
              type: string
          example: example_value
        start_time:
          type: integer
          format: int64
          description: The start time of the run in epoch milliseconds.
          example: 10
        setup_duration:
          type: integer
          format: int64
          description: Setup duration in milliseconds.
          example: 10
        execution_duration:
          type: integer
          format: int64
          description: Execution duration in milliseconds.
          example: 10
        cleanup_duration:
          type: integer
          format: int64
          description: Cleanup duration in milliseconds.
          example: 10
        end_time:
          type: integer
          format: int64
          description: End time in epoch milliseconds.
          example: 10
        trigger:
          type: string
          enum:
          - PERIODIC
          - ONE_TIME
          - RETRY
          - RUN_JOB_TASK
          - FILE_ARRIVAL
          example: PERIODIC
        run_type:
          type: string
          enum:
          - JOB_RUN
          - WORKFLOW_RUN
          - SUBMIT_RUN
          example: JOB_RUN
        attempt_number:
          type: integer
          example: 10
        creator_user_name:
          type: string
          example: example_value
        run_page_url:
          type: string
          description: URL of the run page in the Databricks workspace.
          example: https://www.example.com
        format:
          type: string
          enum:
          - SINGLE_TASK
          - MULTI_TASK
          example: SINGLE_TASK
        git_source:
          $ref: '#/components/schemas/GitSource'
    RunTask:
      type: object
      properties:
        run_id:
          type: integer
          format: int64
          example: '500123'
        task_key:
          type: string
          example: example_value
        description:
          type: string
          example: A sample description.
        state:
          type: object
          properties:
            life_cycle_state:
              type: string
            result_state:
              type: string
            state_message:
              type: string
          example: example_value
        depends_on:
          type: array
          items:
            type: object
            properties:
              task_key:
                type: string
          example: []
        existing_cluster_id:
          type: string
          example: '500123'
        new_cluster:
          $ref: '#/components/schemas/CreateClusterRequest'
        notebook_task:
          type: object
          properties:
            notebook_path:
              type: string
            source:
              type: string
            base_parameters:
              type: object
              additionalProperties:
                type: string
          example: example_value
        spark_jar_task:
          type: object
          properties:
            main_class_name:
              type: string
            parameters:
              type: array
              items:
                type: string
          example: example_value
        spark_python_task:
          type: object
          properties:
            python_file:
              type: string
            parameters:
              type: array
              items:
                type: string
          example: example_value
        sql_task:
          type: object
          properties:
            query:
              type: object
              properties:
                query_id:
                  type: string
            warehouse_id:
              type: string
          example: example_value
        start_time:
          type: integer
          format: int64
          example: 10
        setup_duration:
          type: integer
          format: int64
          example: 10
        execution_duration:
          type: integer
          format: int64
          example: 10
        cleanup_duration:
          type: integer
          format: int64
          example: 10
        end_time:
          type: integer
          format: int64
          example: 10
        cluster_instance:
          type: object
          properties:
            cluster_id:
              type: string
            spark_context_id:
              type: string
          example: example_value
        attempt_number:
          type: integer
          example: 10
        libraries:
          type: array
          items:
            $ref: '#/components/schemas/Library'
          example: []
    WorkspaceObject:
      type: object
      properties:
        object_type:
          type: string
          enum:
          - NOTEBOOK
          - DIRECTORY
          - LIBRARY
          - FILE
          - REPO
          - DASHBOARD
          description: The type of the workspace object.
          example: NOTEBOOK
        path:
          type: string
          description: The absolute path of the object in the workspace.
          example: example_value
        language:
          type: string
          enum:
          - SCALA
          - PYTHON
          - SQL
          - R
          description: >-
            The language of the notebook, if applicable. Only present for
            notebook objects.
          example: SCALA
        object_id:
          type: integer
          format: int64
          description: The unique identifier of the object.
          example: '500123'
        created_at:
          type: integer
          format: int64
          description: The creation time in epoch milliseconds.
          example: '2026-01-15T10:30:00Z'
        modified_at:
          type: integer
          format: int64
          description: The last modified time in epoch milliseconds.
          example: '2026-01-15T10:30:00Z'
        resource_id:
          type: string
          description: Unique identifier for SCIM compliance.
          example: '500123'
        size:
          type: integer
          format: int64
          description: The file size in bytes (for FILE objects).
          example: 10
    ErrorResponse:
      type: object
      properties:
        error_code:
          type: string
          description: A machine-readable error code.
          examples:
          - RESOURCE_DOES_NOT_EXIST
        message:
          type: string
          description: A human-readable error message.
          examples:
          - Cluster 1234-567890-abcde123 does not exist
  responses:
    BadRequest:
      description: The request is malformed or contains invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: >-
        The request lacks valid authentication credentials. Verify your
        access token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: >-
        The authenticated user does not have permission to perform this
        action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: >-
        Too many requests have been sent in a given amount of time. Retry
        after the period specified in the Retry-After header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: >-
        An unexpected error occurred on the server. If the problem persists,
        contact Databricks support.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
